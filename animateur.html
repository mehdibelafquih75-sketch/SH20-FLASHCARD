<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verlordle — Animateur</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-0.5px}
.sub{text-align:center;color:#AFA9EC;font-size:14px;margin-bottom:2rem}
.panel{background:#16213e;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #0f3460}
.panel-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#AFA9EC;margin-bottom:1rem;font-weight:500}
.pin-display{font-size:52px;font-weight:800;letter-spacing:10px;text-align:center;color:#7F77DD;margin:1rem 0}
.join-url{text-align:center;font-size:13px;color:#AFA9EC;word-break:break-all;margin-bottom:1rem}
.btn{padding:10px 28px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.85}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#7F77DD;color:#fff}
.btn-danger{background:#e21b3c;color:#fff}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.question-display{font-size:24px;font-weight:700;text-align:center;margin-bottom:8px;line-height:1.4}
.hint-sub{text-align:center;font-size:15px;color:#AFA9EC;margin-bottom:1.5rem}
.timer-wrap{margin-bottom:1.5rem}
.timer-text{text-align:center;font-size:42px;font-weight:800;color:#7F77DD;margin-bottom:8px;transition:color 0.3s}
.timer-text.urgent{color:#e21b3c;animation:pulse 0.5s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.timer-bar-wrap{height:10px;background:#0f3460;border-radius:5px;overflow:hidden}
.timer-bar{height:10px;border-radius:5px;transition:width 0.1s linear,background 0.3s}
.q-counter{text-align:center;font-size:13px;color:#AFA9EC;margin-bottom:10px}
.answer-count-live{text-align:center;font-size:15px;color:#AFA9EC;margin-bottom:1rem}
.answer-count-live span{color:#fff;font-weight:700;font-size:20px}
.reveal-box{text-align:center;padding:1.25rem;border-radius:14px;font-size:22px;font-weight:800;margin-bottom:1rem;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.reveal-correct{background:#26890c}
.stats-row{display:flex;gap:12px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
.stat-card{background:#0f3460;border-radius:10px;padding:10px 20px;text-align:center;animation:fadeUp 0.4s ease both}
@keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.stat-num{font-size:26px;font-weight:700;color:#7F77DD}
.stat-label{font-size:12px;color:#AFA9EC;margin-top:2px}
.scoreboard{display:flex;flex-direction:column;gap:8px}
.score-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0f3460;border-radius:10px;animation:fadeUp 0.3s ease both}
.rank{width:30px;height:30px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank.gold{background:#d89e00}
.rank.silver{background:#888780}
.rank.bronze{background:#b87333}
.player-name{flex:1;font-weight:500;font-size:15px}
.player-score{font-size:18px;font-weight:700;color:#7F77DD}
.pts-gained{font-size:13px;font-weight:700}
.pts-gained.pos{color:#45c517}
.pts-gained.neg{color:#e21b3c}
.waiting{text-align:center;padding:2rem;color:#AFA9EC;font-size:15px}
.context-box{background:#0f3460;border-radius:10px;padding:12px 16px;font-size:13px;color:#AFA9EC;line-height:1.6;margin-bottom:1rem;border-left:3px solid #7F77DD}
.letters-hint{display:flex;gap:8px;justify-content:center;margin-bottom:1.5rem}
.letter-blank{width:38px;height:38px;border-radius:8px;border:2px solid #7F77DD;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;background:#0f3460}
</style>
</head>
<body>
<div class="wrap">
  <h1>Verlordle</h1>
  <div class="sub">Tableau de bord animateur</div>

  <div class="panel" id="lobby-panel">
    <div class="panel-title">Salle d'attente</div>
    <div class="pin-display" id="pin-display">...</div>
    <div class="join-url" id="join-url">Chargement...</div>
    <div style="text-align:center;color:#AFA9EC;font-size:15px;margin-bottom:1.5rem" id="player-count">0 joueur(s) connecté(s)</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startGame()">Lancer la partie</button>
    </div>
  </div>

  <div class="panel" id="game-panel" style="display:none">
    <div class="q-counter" id="q-counter"></div>
    <div class="question-display" id="q-display"></div>
    <div class="letters-hint" id="letters-hint"></div>
    <div class="hint-sub" id="q-hint"></div>
    <div class="timer-wrap">
      <div class="timer-text" id="timer-text">20</div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%;background:#7F77DD"></div></div>
    </div>
    <div class="answer-count-live" id="answer-count-live"><span>0</span> réponse(s)</div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="revealAnswer()">Révéler la réponse</button>
    </div>
  </div>

  <div class="panel" id="reveal-panel" style="display:none">
    <div class="reveal-box reveal-correct" id="reveal-text"></div>
    <div class="context-box" id="context-box"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="scoreboard" id="scoreboard-reveal"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>
  </div>

  <div class="panel" id="final-panel" style="display:none">
    <div class="panel-title">Classement final</div>
    <div class="scoreboard" id="scoreboard-final"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Joueurs connectés</div>
    <div class="scoreboard" id="players-live"><div class="waiting">En attente de joueurs...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0mxzLQVtdr2afuz7ElbPkXSlLmb-UvBs",
  authDomain: "sh20-7e375.firebaseapp.com",
  projectId: "sh20-7e375",
  storageBucket: "sh20-7e375.firebasestorage.app",
  messagingSenderId: "952318587808",
  appId: "1:952318587808:web:bded62dfb6f4eea490eac5",
  databaseURL: "https://sh20-7e375-default-rtdb.europe-west1.firebasedatabase.app"
};

const WORDS = [
  {word:"MEUF",   hint:"Désigne une femme, une fille",             origin:"FEMME",   context:"L'un des mots verlan les plus répandus — passé dans le français courant de toutes les générations."},
  {word:"OUF",    hint:"Quelque chose d'intense, d'incroyable",    origin:"FOU",     context:"'C'est ouf !' — tellement lexicalisé qu'il figure désormais dans certains dictionnaires."},
  {word:"TEUF",   hint:"Une soirée, une fête",                     origin:"FETE",    context:"Utilisé bien au-delà des cités, symbole de la diffusion grand public du verlan."},
  {word:"RELOU",  hint:"Quelqu'un de pénible, une situation pesante", origin:"LOURD", context:"'T'es relou' — intégré au français standard, y compris chez les adultes et dans les médias."},
  {word:"KEUF",   hint:"Un policier, en argot",                    origin:"FLIC",    context:"Créé pour parler de la police sans être compris : exemple parfait de la fonction cryptique du verlan."},
  {word:"REUM",   hint:"La mère, la maman",                        origin:"MERE",    context:"Avec REUP (père), fait partie du vocabulaire familial verlanisé très répandu dans les cités."},
  {word:"CIMER",  hint:"Pour remercier quelqu'un",                 origin:"MERCI",   context:"Un des rares mots verlan positifs — sa diffusion illustre bien la récupération grand public."},
  {word:"VENER",  hint:"Être en colère, irrité",                   origin:"NERVE",   context:"'Je suis trop véner' — verlan émotionnel très courant."},
  {word:"REUP",   hint:"Le père, le papa",                         origin:"PERE",    context:"Pendant de REUM — illustre la verlanisation systématique du vocabulaire familial."},
  {word:"KEUM",   hint:"Un garçon, un type",                       origin:"MEC",     context:"Pendant masculin de MEUF — l'un des binômes verlan les plus utilisés."},
  {word:"REUBEU", hint:"Désigne une personne d'origine arabe",     origin:"ARABE",   context:"Terme identitaire fort — illustre comment le verlan construit une appartenance communautaire."},
  {word:"CHELOU", hint:"Quelque chose de bizarre, de suspect",     origin:"LOUCHE",  context:"'C'est chelou' — utilisé par toutes les générations, exemple parfait de lexicalisation."},
  {word:"CHANME", hint:"Quelque chose de très bien, d'impressionnant", origin:"MECHAN", context:"'Méchant' devient positif en verlan, comme 'bad' en anglais argotique."},
  {word:"CAILLRA",hint:"Les jeunes de la rue, la 'racaille'",      origin:"RACAILLE",context:"Mot emblématique du lexique des cités, chargé politiquement — médiatisé lors des débats sur les banlieues en 2005."},
  {word:"FEUJ",   hint:"Désigne une personne juive",               origin:"JUIF",    context:"Exemple de verlan identitaire communautaire, utilisé à la fois par la communauté et en dehors d'elle."},
];

const MAX_TIME = 20;
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const PIN = Math.floor(100000 + Math.random() * 900000).toString();
const gameRef = ref(db, `games/${PIN}`);

let currentQ = 0, timerInterval = null, players = {}, answersListener = null;

async function init() {
  await set(gameRef, { pin: PIN, phase: 'lobby', currentQ: -1, questionStart: 0, players: {} });
  document.getElementById('pin-display').textContent = PIN;
  const playerUrl = `${location.origin}${location.pathname.replace('animateur.html','joueur.html')}?pin=${PIN}`;
  document.getElementById('join-url').innerHTML = `Joueurs → <strong>${playerUrl}</strong>`;
  onValue(ref(db, `games/${PIN}/players`), snap => {
    players = snap.val() || {};
    updatePlayersLive();
    document.getElementById('player-count').textContent = `${Object.keys(players).length} joueur(s) connecté(s)`;
  });
}

function updatePlayersLive() {
  const el = document.getElementById('players-live');
  const sorted = Object.entries(players).sort((a,b) => (b[1].score||0)-(a[1].score||0));
  if (!sorted.length) { el.innerHTML = '<div class="waiting">En attente de joueurs...</div>'; return; }
  el.innerHTML = sorted.map(([,p],i) => `
    <div class="score-row" style="animation-delay:${i*0.05}s">
      <div class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
      <div class="player-name">${p.name||'Anonyme'}</div>
      <div class="player-score">${p.score||0} pts</div>
    </div>`).join('');
}

window.startGame = async function() {
  if (!Object.keys(players).length) { alert('Aucun joueur !'); return; }
  currentQ = 0; await showQuestion();
}

async function showQuestion() {
  const q = WORDS[currentQ];
  document.getElementById('lobby-panel').style.display = 'none';
  document.getElementById('reveal-panel').style.display = 'none';
  document.getElementById('final-panel').style.display = 'none';
  document.getElementById('game-panel').style.display = 'block';
  document.getElementById('q-counter').textContent = `Question ${currentQ+1} / ${WORDS.length}`;
  document.getElementById('q-display').textContent = q.hint;
  document.getElementById('q-hint').textContent = `Mot verlan à trouver — ${q.word.length} lettre${q.word.length>1?'s':''}`;
  document.getElementById('letters-hint').innerHTML = q.word.split('').map(() => `<div class="letter-blank">_</div>`).join('');
  document.getElementById('answer-count-live').innerHTML = `<span>0</span> réponse(s)`;

  const questionStart = Date.now();
  await update(gameRef, { phase:'playing', currentQ, questionStart, correctAnswer: q.word });
  await set(ref(db, `games/${PIN}/answers`), {});

  if (answersListener) answersListener();
  answersListener = onValue(ref(db, `games/${PIN}/answers`), snap => {
    const count = snap.val() ? Object.keys(snap.val()).length : 0;
    document.getElementById('answer-count-live').innerHTML = `<span>${count}</span> réponse(s)`;
  });

  startTimer(questionStart);
}

function startTimer(questionStart) {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - questionStart) / 1000;
    const left = Math.max(0, MAX_TIME - elapsed);
    const pct = left / MAX_TIME * 100;
    const bar = document.getElementById('timer-bar');
    const txt = document.getElementById('timer-text');
    bar.style.width = pct + '%';
    bar.style.background = left <= 5 ? '#e21b3c' : left <= 10 ? '#d89e00' : '#7F77DD';
    txt.textContent = Math.ceil(left);
    txt.className = 'timer-text' + (left <= 5 ? ' urgent' : '');
    if (left <= 0) { clearInterval(timerInterval); revealAnswer(); }
  }, 100);
}

window.revealAnswer = async function() {
  clearInterval(timerInterval);
  if (answersListener) { answersListener(); answersListener = null; }
  const q = WORDS[currentQ];
  const [answersSnap, startSnap] = await Promise.all([
    get(ref(db, `games/${PIN}/answers`)),
    get(ref(db, `games/${PIN}/questionStart`))
  ]);
  const answers = answersSnap.val() || {};
  const questionStart = startSnap.val() || Date.now();
  let correctCount = 0;
  const updates = {};
  for (const [pid, ans] of Object.entries(answers)) {
    const isCorrect = ans.answer?.toUpperCase() === q.word.toUpperCase();
    if (isCorrect) {
      correctCount++;
      const elapsed = Math.min((ans.timestamp - questionStart) / 1000, MAX_TIME);
      const pts = Math.round(1000 * (1 - elapsed / MAX_TIME * 0.7));
      updates[`games/${PIN}/players/${pid}/score`] = (players[pid]?.score||0) + pts;
      updates[`games/${PIN}/players/${pid}/lastPts`] = pts;
    } else {
      updates[`games/${PIN}/players/${pid}/lastPts`] = 0;
    }
  }
  await update(ref(db), updates);
  await update(gameRef, { phase: 'reveal' });

  const playersSnap = await get(ref(db, `games/${PIN}/players`));
  players = playersSnap.val() || {};
  const total = Object.keys(players).length;

  document.getElementById('game-panel').style.display = 'none';
  document.getElementById('reveal-panel').style.display = 'block';
  document.getElementById('reveal-text').textContent = `✓  ${q.word}  =  verlan de  ${q.origin}`;
  document.getElementById('context-box').textContent = q.context;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${correctCount}</div><div class="stat-label">Bonnes réponses</div></div>
    <div class="stat-card"><div class="stat-num">${total-correctCount}</div><div class="stat-label">Mauvaises</div></div>
    <div class="stat-card"><div class="stat-num">${total?Math.round(correctCount/total*100):0}%</div><div class="stat-label">Taux de réussite</div></div>`;

  const sorted = Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  document.getElementById('scoreboard-reveal').innerHTML = sorted.map(([,p],i) => `
    <div class="score-row" style="animation-delay:${i*0.06}s">
      <div class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
      <div class="player-name">${p.name||'Anonyme'}</div>
      <div class="player-score">${p.score||0} pts</div>
      <div class="pts-gained ${p.lastPts>0?'pos':'neg'}">${p.lastPts>0?'+'+p.lastPts:'+0'}</div>
    </div>`).join('');

  document.getElementById('next-btn').textContent = currentQ >= WORDS.length-1
    ? 'Voir le classement final' : `Question suivante (${currentQ+2}/${WORDS.length}) →`;
}

window.nextQuestion = async function() {
  currentQ++;
  if (currentQ >= WORDS.length) showFinal(); else await showQuestion();
}

async function showFinal() {
  await update(gameRef, { phase: 'finished' });
  const snap = await get(ref(db, `games/${PIN}/players`));
  players = snap.val() || {};
  document.getElementById('reveal-panel').style.display = 'none';
  document.getElementById('final-panel').style.display = 'block';
  const sorted = Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  document.getElementById('scoreboard-final').innerHTML = sorted.map(([,p],i) => `
    <div class="score-row" style="animation-delay:${i*0.07}s">
      <div class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="player-name">${p.name||'Anonyme'}</div>
      <div class="player-score">${p.score||0} pts</div>
    </div>`).join('');
}

init();
</script>
</body>
</html>

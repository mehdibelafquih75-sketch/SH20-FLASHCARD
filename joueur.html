<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verlordle — Joueur</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem}
.wrap{width:100%;max-width:400px}
h1{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;letter-spacing:-0.5px}
.sub{text-align:center;color:#AFA9EC;font-size:13px;margin-bottom:2rem}
.panel{background:#16213e;border-radius:16px;padding:1.5rem;border:1px solid #0f3460}

/* Join */
input[type=text]{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #0f3460;background:#0f3460;color:#fff;font-size:16px;margin-bottom:12px;outline:none;transition:border-color 0.2s}
input[type=text]:focus{border-color:#7F77DD}
input[type=text]::placeholder{color:#888780}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:#7F77DD;color:#fff;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.85}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.4;cursor:default}
.error{color:#e21b3c;font-size:13px;text-align:center;margin-top:8px;min-height:18px}

/* Lobby */
.lobby-name{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.lobby-msg{text-align:center;color:#AFA9EC;font-size:14px;line-height:1.7;margin-bottom:1.5rem}
.score-card{background:#0f3460;border-radius:12px;padding:1rem;text-align:center}
.score-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#AFA9EC;margin-bottom:4px}
.score-num{font-size:36px;font-weight:800;color:#7F77DD}

/* Game */
.q-counter{text-align:center;font-size:12px;color:#AFA9EC;margin-bottom:12px}
.hint-text{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1.4}
.hint-sub{text-align:center;font-size:13px;color:#AFA9EC;margin-bottom:16px}
.letter-blanks{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.letter-blank{width:42px;height:42px;border-radius:8px;border:2px solid #7F77DD;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;background:#0f3460;text-transform:uppercase;transition:all 0.15s}
.letter-blank.filled{border-color:#AFA9EC;background:#16213e}
.timer-wrap{margin-bottom:16px}
.timer-text{text-align:center;font-size:38px;font-weight:800;color:#7F77DD;margin-bottom:6px;transition:color 0.3s}
.timer-text.urgent{color:#e21b3c;animation:pulse 0.5s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.timer-bar-wrap{height:8px;background:#0f3460;border-radius:4px;overflow:hidden}
.timer-bar{height:8px;border-radius:4px;transition:width 0.1s linear,background 0.3s}
.input-area{display:flex;gap:8px;margin-bottom:12px}
.word-input{flex:1;padding:14px 16px;border-radius:10px;border:2px solid #0f3460;background:#0f3460;color:#fff;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:2px;outline:none;transition:border-color 0.2s;text-align:center}
.word-input:focus{border-color:#7F77DD}
.word-input::placeholder{color:#888780;font-size:14px;letter-spacing:0;font-weight:400}
.word-input:disabled{opacity:0.5}
.submit-btn{padding:14px 20px;border-radius:10px;border:none;background:#7F77DD;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s,transform 0.1s;white-space:nowrap}
.submit-btn:hover{opacity:0.85}
.submit-btn:active{transform:scale(0.96)}
.submit-btn:disabled{opacity:0.4;cursor:default}
.answered-waiting{text-align:center;color:#AFA9EC;font-size:14px;margin-top:8px}

/* Feedback */
.feedback-card{border-radius:14px;padding:1.25rem;text-align:center;margin-bottom:1rem;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-correct{background:#26890c}
.feedback-wrong{background:#e21b3c}
.feedback-icon{font-size:40px;margin-bottom:8px}
.feedback-pts{font-size:32px;font-weight:800;margin-bottom:4px}
.feedback-msg{font-size:14px;opacity:0.9}
.context-box{background:#0f3460;border-radius:10px;padding:12px 14px;font-size:13px;color:#AFA9EC;line-height:1.6;margin-bottom:1rem;border-left:3px solid #7F77DD;animation:fadeUp 0.5s ease 0.3s both}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.waiting-next{text-align:center;color:#AFA9EC;font-size:14px;margin-top:8px;animation:fadeUp 0.4s ease 0.5s both}

/* Final */
.final-rank{font-size:56px;text-align:center;margin-bottom:8px;animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.final-score{font-size:36px;font-weight:800;color:#7F77DD;text-align:center;margin-bottom:10px}
.final-msg{text-align:center;color:#AFA9EC;font-size:14px;line-height:1.7}

/* Shake animation for wrong */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>
<body>
<div class="wrap">
  <h1>Verlordle</h1>
  <div class="sub">Mode Kahoot — Sois le plus rapide !</div>

  <div class="panel" id="join-panel">
    <input type="text" id="pin-input" placeholder="Code PIN (6 chiffres)" maxlength="6" inputmode="numeric">
    <input type="text" id="name-input" placeholder="Ton prénom" maxlength="20">
    <button class="btn" onclick="joinGame()">Rejoindre</button>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="panel" id="lobby-panel" style="display:none">
    <div class="lobby-name" id="lobby-name"></div>
    <div class="lobby-msg">Tu es dans la salle !<br>En attente du lancement par l'animateur…</div>
    <div class="score-card">
      <div class="score-label">Ton score</div>
      <div class="score-num" id="live-score">0</div>
    </div>
  </div>

  <div class="panel" id="game-panel" style="display:none">
    <div class="q-counter" id="q-counter-p"></div>
    <div class="hint-text" id="hint-text-p"></div>
    <div class="hint-sub" id="hint-sub-p"></div>
    <div class="letter-blanks" id="letter-blanks-p"></div>
    <div class="timer-wrap">
      <div class="timer-text" id="timer-text-p">20</div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar-p" style="width:100%;background:#7F77DD"></div></div>
    </div>
    <div class="input-area">
      <input type="text" class="word-input" id="word-input" placeholder="Tape le mot verlan…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">Envoyer</button>
    </div>
    <div class="answered-waiting" id="answered-waiting" style="display:none">Réponse envoyée ! En attente de la révélation…</div>
  </div>

  <div class="panel" id="answered-panel" style="display:none">
    <div id="answer-feedback"></div>
    <div class="context-box" id="context-box-p"></div>
    <div class="score-card">
      <div class="score-label">Score total</div>
      <div class="score-num" id="total-score-p">0</div>
    </div>
    <div class="waiting-next">En attente de la prochaine question…</div>
  </div>

  <div class="panel" id="final-panel" style="display:none">
    <div class="final-rank" id="final-rank"></div>
    <div class="final-score" id="final-score"></div>
    <div class="final-msg" id="final-msg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0mxzLQVtdr2afuz7ElbPkXSlLmb-UvBs",
  authDomain: "sh20-7e375.firebaseapp.com",
  projectId: "sh20-7e375",
  storageBucket: "sh20-7e375.firebasestorage.app",
  messagingSenderId: "952318587808",
  appId: "1:952318587808:web:bded62dfb6f4eea490eac5",
  databaseURL: "https://sh20-7e375-default-rtdb.europe-west1.firebasedatabase.app"
};

const WORDS = [
  {word:"MEUF",   hint:"Désigne une femme, une fille",                origin:"FEMME",    context:"L'un des mots verlan les plus répandus — passé dans le français courant de toutes les générations."},
  {word:"OUF",    hint:"Quelque chose d'intense, d'incroyable",       origin:"FOU",      context:"'C'est ouf !' — tellement lexicalisé qu'il figure désormais dans certains dictionnaires."},
  {word:"TEUF",   hint:"Une soirée, une fête",                        origin:"FETE",     context:"Utilisé bien au-delà des cités, symbole de la diffusion grand public du verlan."},
  {word:"RELOU",  hint:"Quelqu'un de pénible, une situation pesante", origin:"LOURD",    context:"'T'es relou' — intégré au français standard, y compris chez les adultes et dans les médias."},
  {word:"KEUF",   hint:"Un policier, en argot",                       origin:"FLIC",     context:"Créé pour parler de la police sans être compris : exemple parfait de la fonction cryptique du verlan."},
  {word:"REUM",   hint:"La mère, la maman",                           origin:"MERE",     context:"Avec REUP (père), fait partie du vocabulaire familial verlanisé très répandu dans les cités."},
  {word:"CIMER",  hint:"Pour remercier quelqu'un",                    origin:"MERCI",    context:"Un des rares mots verlan positifs — sa diffusion illustre bien la récupération grand public."},
  {word:"VENER",  hint:"Être en colère, irrité",                      origin:"NERVE",    context:"'Je suis trop véner' — verlan émotionnel très courant."},
  {word:"REUP",   hint:"Le père, le papa",                            origin:"PERE",     context:"Pendant de REUM — illustre la verlanisation systématique du vocabulaire familial."},
  {word:"KEUM",   hint:"Un garçon, un type",                          origin:"MEC",      context:"Pendant masculin de MEUF — l'un des binômes verlan les plus utilisés."},
  {word:"REUBEU", hint:"Désigne une personne d'origine arabe",        origin:"ARABE",    context:"Terme identitaire fort — illustre comment le verlan construit une appartenance communautaire."},
  {word:"CHELOU", hint:"Quelque chose de bizarre, de suspect",        origin:"LOUCHE",   context:"'C'est chelou' — utilisé par toutes les générations, exemple parfait de lexicalisation."},
  {word:"CHANME", hint:"Quelque chose de très bien, d'impressionnant",origin:"MECHAN",   context:"'Méchant' devient positif en verlan, comme 'bad' en anglais argotique."},
  {word:"CAILLRA",hint:"Les jeunes de la rue, la 'racaille'",         origin:"RACAILLE", context:"Mot emblématique du lexique des cités, chargé politiquement — médiatisé lors des débats sur les banlieues en 2005."},
  {word:"FEUJ",   hint:"Désigne une personne juive",                  origin:"JUIF",     context:"Exemple de verlan identitaire communautaire, utilisé à la fois par la communauté et en dehors d'elle."},
];

const MAX_TIME = 20;
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);
if (params.get('pin')) document.getElementById('pin-input').value = params.get('pin');

let PIN='', playerId='', playerName='', myScore=0;
let timerInterval=null, hasAnswered=false, gameListener=null;

window.joinGame = async function() {
  PIN = document.getElementById('pin-input').value.trim();
  playerName = document.getElementById('name-input').value.trim();
  const err = document.getElementById('error-msg');
  if (!PIN || PIN.length!==6) { err.textContent='Entre un code PIN à 6 chiffres.'; return; }
  if (!playerName) { err.textContent='Entre ton prénom.'; return; }
  const snap = await get(ref(db, `games/${PIN}`));
  if (!snap.exists()) { err.textContent='Partie introuvable. Vérifie le PIN.'; return; }
  if (snap.val().phase==='finished') { err.textContent='Cette partie est terminée.'; return; }
  playerId = 'p_' + Math.random().toString(36).substr(2,9);
  await set(ref(db, `games/${PIN}/players/${playerId}`), { name: playerName, score:0, lastPts:0 });
  showOnly('lobby-panel');
  document.getElementById('lobby-name').textContent = playerName;
  listenGame();
}

function listenGame() {
  gameListener = onValue(ref(db, `games/${PIN}`), snap => {
    const game = snap.val(); if (!game) return;
    myScore = game.players?.[playerId]?.score || 0;
    document.getElementById('live-score').textContent = myScore;
    if (game.phase==='lobby') { showOnly('lobby-panel'); }
    else if (game.phase==='playing') {
      hasAnswered = false;
      showQuestion(game.currentQ, game.questionStart);
    }
    else if (game.phase==='reveal') {
      clearInterval(timerInterval);
      if (!hasAnswered) hasAnswered = true;
      const lastPts = game.players?.[playerId]?.lastPts || 0;
      showReveal(lastPts, game.correctAnswer, game.currentQ);
    }
    else if (game.phase==='finished') {
      clearInterval(timerInterval);
      showFinal(game.players);
    }
  });
}

function showOnly(id) {
  ['lobby-panel','game-panel','answered-panel','final-panel'].forEach(p =>
    document.getElementById(p).style.display = p===id?'block':'none'
  );
}

function showQuestion(qIdx, questionStart) {
  const q = WORDS[qIdx];
  showOnly('game-panel');
  document.getElementById('q-counter-p').textContent = `Question ${qIdx+1} / ${WORDS.length}`;
  document.getElementById('hint-text-p').textContent = q.hint;
  document.getElementById('hint-sub-p').textContent = `Mot verlan à trouver — ${q.word.length} lettre${q.word.length>1?'s':''}`;
  document.getElementById('letter-blanks-p').innerHTML = q.word.split('').map(()=>`<div class="letter-blank">_</div>`).join('');
  const inp = document.getElementById('word-input');
  const btn = document.getElementById('submit-btn');
  inp.value=''; inp.disabled=false; inp.focus();
  btn.disabled=false;
  document.getElementById('answered-waiting').style.display='none';
  inp.oninput = () => {
    const blanks = document.querySelectorAll('.letter-blank');
    const val = inp.value.toUpperCase().split('');
    blanks.forEach((b,i) => {
      b.textContent = val[i] || '_';
      b.className = 'letter-blank' + (val[i]?' filled':'');
    });
  };
  inp.onkeydown = e => { if (e.key==='Enter') submitAnswer(); };
  startTimerPlayer(questionStart);
}

function startTimerPlayer(questionStart) {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - questionStart) / 1000;
    const left = Math.max(0, MAX_TIME - elapsed);
    const pct = left / MAX_TIME * 100;
    const bar = document.getElementById('timer-bar-p');
    const txt = document.getElementById('timer-text-p');
    if (!bar || !txt) return;
    bar.style.width = pct + '%';
    bar.style.background = left<=5?'#e21b3c':left<=10?'#d89e00':'#7F77DD';
    txt.textContent = Math.ceil(left);
    txt.className = 'timer-text' + (left<=5?' urgent':'');
    if (left<=0) {
      clearInterval(timerInterval);
      if (!hasAnswered) {
        document.getElementById('word-input').disabled=true;
        document.getElementById('submit-btn').disabled=true;
        document.getElementById('answered-waiting').style.display='block';
        document.getElementById('answered-waiting').textContent='Temps écoulé !';
      }
    }
  }, 100);
}

window.submitAnswer = async function() {
  if (hasAnswered) return;
  const val = document.getElementById('word-input').value.trim();
  if (!val) return;
  hasAnswered = true;
  clearInterval(timerInterval);
  document.getElementById('word-input').disabled=true;
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('answered-waiting').style.display='block';
  await set(ref(db, `games/${PIN}/answers/${playerId}`), { answer: val.toUpperCase(), timestamp: Date.now() });
}

function showReveal(pts, correctAnswer, qIdx) {
  showOnly('answered-panel');
  const correct = pts > 0;
  document.getElementById('answer-feedback').innerHTML = correct
    ? `<div class="feedback-card feedback-correct"><div class="feedback-icon">✓</div><div class="feedback-pts">+${pts} pts</div><div class="feedback-msg">Bonne réponse !</div></div>`
    : `<div class="feedback-card feedback-wrong"><div class="feedback-icon">✗</div><div class="feedback-pts">+0 pts</div><div class="feedback-msg">C'était : ${correctAnswer}</div></div>`;
  document.getElementById('context-box-p').textContent = WORDS[qIdx]?.context || '';
  document.getElementById('total-score-p').textContent = myScore;

  if (!correct) {
    setTimeout(() => {
      const card = document.querySelector('.feedback-card');
      if (card) card.classList.add('shake');
    }, 100);
  }
}

function showFinal(players) {
  showOnly('final-panel');
  if (!players) return;
  const sorted = Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const myRank = sorted.findIndex(([id])=>id===playerId)+1;
  const total = sorted.length;
  const rankEmoji = myRank===1?'🥇':myRank===2?'🥈':myRank===3?'🥉':`#${myRank}`;
  document.getElementById('final-rank').textContent = rankEmoji;
  document.getElementById('final-score').textContent = `${players[playerId]?.score||0} pts`;
  document.getElementById('final-msg').textContent =
    myRank===1 ? 'Bravo, tu es le champion du verlan !' :
    myRank<=3  ? `Podium ! ${myRank}e sur ${total} joueurs.` :
                 `${myRank}e sur ${total} — bien joué !`;
}
</script>
</body>
</html>
